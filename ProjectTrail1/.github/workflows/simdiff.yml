name: SimDiff Report

on: [push]

jobs:
  simdiff:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Run SimDiff
        run: |
          simdiff HEAD~1 HEAD > report.txt

      - name: Upload report
        uses: actions/upload-artifact@v3
        with:
          name: simdiff-report
          path: report.txt